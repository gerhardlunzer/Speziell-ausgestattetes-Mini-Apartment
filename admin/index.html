<!DOCTYPE html>
<html lang="de">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Administration</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>Administration</h1>

    <p class="subtitle">

        Apartment Forchtenstein

    </p>

    <div class="cards">

        <button id="calendar">

            📅<br>
            Kalender aktualisieren

        </button>

        <button id="gallery">

            🖼<br>
            Galerie verwalten

        </button>

        <button id="settings">

            ⚙<br>
            Einstellungen

        </button>

        <button id="status">

            📊<br>
            Systemstatus

        </button>

    </div>

    <div class="status-box">

    <h2>Systemstatus</h2>

    <p><strong>Homepage:</strong> <span id="statusVersion"></span></p>

    <p><strong>Kalender:</strong> <span id="statusCalendar"></span></p>

    <p><strong>Galerie:</strong> <span id="statusGallery"></span></p>

    <p><strong>Letzte Synchronisierung:</strong></p>

    <p id="statusSync">noch keine</p>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
